services:
  # FastAPI Backend
  - type: web
    name: polybot-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
    plan: free

  # React Dashboard
  - type: static
    name: polybot-dashboard
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
